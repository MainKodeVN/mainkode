version: 2
models:
  - name: stgs_salesforce__opportunities
    description: The stgs_salesforce__opportunities model is a transformation of the
      raw Salesforce opportunities data. It includes the opportunity ID,
      customer ID, opportunity stage, close date, and expected revenue. The
      opportunity ID and customer ID are numerical identifiers, the opportunity
      stage is a string that describes the current stage of the opportunity, the
      close date is the date the opportunity was closed, and the expected
      revenue is a floating point number representing the expected revenue from
      the opportunity.
    columns:
      - name: opportunityid
        data_type: number
        description: This is a unique identifier for each opportunity in the Salesforce
          system. It is a numeric value that is automatically generated by the
          system when a new opportunity is created.
      - name: customerid
        data_type: number
        description: This is a unique identifier for each customer. It is a numeric
          value that is automatically generated and assigned when a new customer
          is created in the Salesforce system.
      - name: opportunitystage
        data_type: varchar
        description: The 'opportunitystage' column represents the current stage of the
          opportunity in the sales pipeline. This is a varchar type column.
      - name: closedate
        data_type: date
        description: The date when the opportunity was closed. This field is of date type.
      - name: expectedrevenue
        data_type: float
        description: This column represents the expected revenue from the opportunity.
          It is a floating point number that is calculated based on the
          opportunity stage, close date, and other factors.
